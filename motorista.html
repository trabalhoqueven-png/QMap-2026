<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Painel Motorista</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css">

<style>

body{
margin:0;
font-family:Arial;
}

#map{
height:100vh;
width:100%;
}

.painel{
position:fixed;
top:10px;
left:10px;
width:320px;
max-height:90vh;
overflow:auto;
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.3);
z-index:999;
}

.corrida{
padding:10px;
margin-bottom:10px;
border:1px solid #ddd;
border-radius:10px;
}

button{
width:100%;
height:40px;
border:none;
background:#16a34a;
color:white;
border-radius:8px;
cursor:pointer;
}

</style>

</head>
<body>

<div class="painel">

<h2>Corridas Disponíveis</h2>

<div id="listaCorridas"></div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module" src="motorista.js"></script>

</body>
</html>
