<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>QMap Monitoramento</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      display:flex;
      height:100vh;
      overflow:hidden;
      background:#0f172a;
      color:white;
    }

    /* SIDEBAR */

    .sidebar{
      width:320px;
      background:#111827;
      border-right:1px solid #1f2937;
      display:flex;
      flex-direction:column;
    }

    .logo{
      padding:20px;
      font-size:24px;
      font-weight:bold;
      color:#22c55e;
      border-bottom:1px solid #1f2937;
    }

    .menu{
      padding:15px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .menu button{
      background:#1e293b;
      color:white;
      border:none;
      padding:14px;
      border-radius:10px;
      cursor:pointer;
      text-align:left;
      transition:0.3s;
    }

    .menu button:hover{
      background:#22c55e;
    }

    /* LISTA */

    .veiculos{
      flex:1;
      overflow-y:auto;
      padding:15px;
    }

    .veiculo{
      background:#1e293b;
      border-radius:12px;
      padding:15px;
      margin-bottom:12px;
      border:1px solid transparent;
      transition:0.3s;
      cursor:pointer;
    }

    .veiculo:hover{
      border-color:#22c55e;
    }

    .veiculo-top{
      display:flex;
      justify-content:space-between;
      margin-bottom:10px;
    }

    .status{
      padding:5px 10px;
      border-radius:20px;
      font-size:12px;
      font-weight:bold;
    }

    .online{
      background:#14532d;
      color:#4ade80;
    }

    .offline{
      background:#450a0a;
      color:#f87171;
    }

    .info{
      font-size:13px;
      margin-top:5px;
      color:#cbd5e1;
    }

    .acoes{
      display:flex;
      gap:10px;
      margin-top:15px;
    }

    .btn-editar,
    .btn-excluir{

      flex:1;
      border:none;
      padding:8px;
      border-radius:8px;
      cursor:pointer;
      font-weight:bold;
    }

    .btn-editar{
      background:#2563eb;
      color:white;
    }

    .btn-excluir{
      background:#dc2626;
      color:white;
    }

    /* CONTENT */

    .content{
      flex:1;
      display:flex;
      flex-direction:column;
    }

    .topbar{
      height:70px;
      background:#111827;
      border-bottom:1px solid #1f2937;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 25px;
    }

    .top-info{
      display:flex;
      gap:15px;
      align-items:center;
    }

    .card{
      background:#1e293b;
      padding:10px 15px;
      border-radius:10px;
    }

    .btn-sair{
      background:#dc2626;
      color:white;
      border:none;
      padding:10px 15px;
      border-radius:10px;
      cursor:pointer;
      font-weight:bold;
    }

    .btn-sair:hover{
      background:#b91c1c;
    }

    /* MAPA */

    #map{
      flex:1;
    }

    /* BOTAO FLOAT */

    .btn-float{
      position:absolute;
      bottom:25px;
      right:25px;
      width:60px;
      height:60px;
      border-radius:50%;
      border:none;
      background:#22c55e;
      color:white;
      font-size:22px;
      cursor:pointer;
      z-index:999;
      box-shadow:0 0 15px rgba(0,0,0,0.5);
    }

    /* MODAL */

    .modal{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.7);
      display:none;
      justify-content:center;
      align-items:center;
      z-index:2000;
    }

    .modal-content{
      width:400px;
      background:#111827;
      border-radius:15px;
      padding:25px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .modal-content input,
    .modal-content select{
      padding:12px;
      border:none;
      border-radius:10px;
      background:#1e293b;
      color:white;
    }

    .salvar{
      background:#22c55e;
      color:white;
      border:none;
      padding:12px;
      border-radius:10px;
      cursor:pointer;
      font-weight:bold;
    }

    .cancelar{
      background:#334155;
      color:white;
      border:none;
      padding:12px;
      border-radius:10px;
      cursor:pointer;
    }

    ::-webkit-scrollbar{
      width:6px;
    }

    ::-webkit-scrollbar-thumb{
      background:#334155;
      border-radius:10px;
    }

  </style>

</head>
<body>

  <!-- SIDEBAR -->

  <div class="sidebar">

    <div class="logo">
      <i class="fa-solid fa-location-dot"></i>
      QMap Monitor
    </div>

    <div class="menu">

      <button>
        <i class="fa-solid fa-car"></i>
        Veículos
      </button>

      <button>
        <i class="fa-solid fa-users"></i>
        Clientes
      </button>

      <button>
        <i class="fa-solid fa-clock-rotate-left"></i>
        Histórico
      </button>

      <button>
        <i class="fa-solid fa-shield"></i>
        Cercas Virtuais
      </button>

      <button>
        <i class="fa-solid fa-bell"></i>
        Alertas
      </button>

      <button>
        <i class="fa-solid fa-ban"></i>
        Bloqueio
      </button>

    </div>

    <div class="veiculos" id="listaVeiculos"></div>

  </div>

  <!-- CONTEUDO -->

  <div class="content">

    <div class="topbar">

      <h2>Painel de Monitoramento</h2>

      <div class="top-info">

        <div class="card">
          🟢 Online:
          <span id="onlineCount">0</span>
        </div>

        <div class="card">
          🚗 Veículos:
          <span id="veiculosCount">0</span>
        </div>

        <div class="card">
          📡 Servidor ONLINE
        </div>

        <button class="btn-sair" id="btnSair">
          <i class="fa-solid fa-right-from-bracket"></i>
          Sair
        </button>

      </div>

    </div>

    <div id="map"></div>

  </div>

  <!-- BOTAO -->

  <button class="btn-float" id="abrirModal">
    <i class="fa-solid fa-plus"></i>
  </button>

  <!-- MODAL -->

  <div class="modal" id="modal">

    <div class="modal-content">

      <h3>Novo Veículo</h3>

      <input type="text" id="nome" placeholder="Nome do veículo">

      <input type="text" id="placa" placeholder="Placa">

      <input type="text" id="imei" placeholder="IMEI">

      <select id="status">
        <option value="online">Online</option>
        <option value="offline">Offline</option>
      </select>

      <button class="salvar" id="salvar">
        Salvar
      </button>

      <button class="cancelar" id="fechar">
        Cancelar
      </button>

    </div>

  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <script>

    /* MAPA */

    const map = L.map('map').setView([-10.184, -48.333], 13);

    L.tileLayer(
      'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
      {
        attribution:'© OpenStreetMap'
      }
    ).addTo(map);

    /* ELEMENTOS */

    const listaVeiculos =
      document.getElementById('listaVeiculos');

    const onlineCount =
      document.getElementById('onlineCount');

    const veiculosCount =
      document.getElementById('veiculosCount');

    const modal =
      document.getElementById('modal');

    /* VEICULOS */

    const veiculos = [

      {
        nome:'Honda Civic',
        placa:'QWE-2026',
        imei:'864500000001',
        lat:-10.184,
        lng:-48.333,
        velocidade:60,
        status:'online'
      },

      {
        nome:'CG 160 Titan',
        placa:'ABC-3030',
        imei:'864500000002',
        lat:-10.190,
        lng:-48.320,
        velocidade:0,
        status:'offline'
      }

    ];

    const markers = [];

    /* RENDER */

    function renderizarVeiculos(){

      listaVeiculos.innerHTML = '';

      markers.forEach(m => {
        map.removeLayer(m);
      });

      markers.length = 0;

      let online = 0;

      veiculos.forEach((v,index)=>{

        if(v.status === 'online'){
          online++;
        }

        const div =
          document.createElement('div');

        div.className = 'veiculo';

        div.innerHTML = `

          <div class="veiculo-top">

            <strong>${v.nome}</strong>

            <span class="status ${v.status}">
              ${v.status}
            </span>

          </div>

          <div class="info">
            🚘 ${v.placa}
          </div>

          <div class="info">
            📡 IMEI: ${v.imei}
          </div>

          <div class="info">
            ⚡ ${v.velocidade} km/h
          </div>

          <div class="acoes">

            <button
              class="btn-editar"
              onclick="editarVeiculo(${index})">

              ✏️ Editar

            </button>

            <button
              class="btn-excluir"
              onclick="excluirVeiculo(${index})">

              🗑 Excluir

            </button>

          </div>

        `;

        div.onclick = () => {
          map.setView([v.lat,v.lng],16);
        };

        listaVeiculos.appendChild(div);

        const marker = L.marker([v.lat,v.lng])

          .addTo(map)

          .bindPopup(`

            <strong>${v.nome}</strong><br>

            🚘 ${v.placa}<br>

            ⚡ ${v.velocidade} km/h<br>

            📡 ${v.status}

          `);

        markers.push(marker);

      });

      onlineCount.innerText = online;
      veiculosCount.innerText = veiculos.length;

    }

    renderizarVeiculos();

    /* ABRIR MODAL */

    abrirModal.onclick = () => {
      modal.style.display = 'flex';
    };

    fechar.onclick = () => {
      modal.style.display = 'none';
    };

    /* SALVAR */

    salvar.onclick = () => {

      const nome =
        document.getElementById('nome').value;

      const placa =
        document.getElementById('placa').value;

      const imei =
        document.getElementById('imei').value;

      const status =
        document.getElementById('status').value;

      if(!nome || !placa || !imei){

        alert('Preencha todos os campos');

        return;
      }

      veiculos.push({

        nome,
        placa,
        imei,
        status,

        velocidade:
          Math.floor(Math.random() * 120),

        lat:
          -10.184 + (Math.random()/100),

        lng:
          -48.333 + (Math.random()/100)

      });

      renderizarVeiculos();

      modal.style.display = 'none';

      nome.value = '';
      placa.value = '';
      imei.value = '';

    };

    /* EDITAR */

    window.editarVeiculo = (index) => {

      const novoNome = prompt(
        'Novo nome:',
        veiculos[index].nome
      );

      if(!novoNome) return;

      veiculos[index].nome = novoNome;

      renderizarVeiculos();

    };

    /* EXCLUIR */

    window.excluirVeiculo = (index) => {

      if(
        !confirm('Deseja excluir?')
      ) return;

      veiculos.splice(index,1);

      renderizarVeiculos();

    };

    /* SAIR */

    document.getElementById('btnSair')
    .onclick = () => {

      if(confirm('Deseja sair?')){

        window.location.href =
          'index.html';

      }

    };

    /* TEMPO REAL */

    setInterval(()=>{

      veiculos.forEach(v=>{

        if(v.status === 'online'){

          v.lat +=
            (Math.random()-0.5)/1000;

          v.lng +=
            (Math.random()-0.5)/1000;

          v.velocidade =
            Math.floor(Math.random()*120);

        }

      });

      renderizarVeiculos();

    },5000);

  </script>

</body>
</html>
