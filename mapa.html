<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Mapa de Perdidos e Aluguel</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
</head>
<body>
  
<div class="sidebar">
  <div id="painel">
  Coins: <span id="coins">0</span> |
  Gratis: <span id="gratis">0</span>
</div>
  <h2>🗺️ Anúncios</h2>
  <button id="btnAdd" class="btn-add">➕ Novo anúncio</button>
  <button id="btnSair" class="btn-sair">🚪 Sair</button>
</div>

<!-- MODAL -->
<div id="modal" class="modal hidden">
  <div class="modal-content">
    <h3>Novo anúncio</h3>

    <select id="tipo">
      <option value="perdido">Item Perdido</option>
      <option value="aluguel">Casa para Alugar</option>
    </select>

    <input id="titulo" placeholder="Título">
    <textarea id="descricao" placeholder="Descrição"></textarea>
    <input type="text" id="preco" placeholder="Preço (se aluguel)" maxlength="15">
    <input type="text" id="telefone" placeholder="Telefone" maxlength="15">

    <p style="font-size:12px">Clique no mapa para escolher localização</p>

    <button id="salvar">Salvar</button>
    <button id="fechar">Cancelar</button>
  </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script type="module" src="mapa.js"></script>

</body>
</html>
