<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>QMap Monitoramento</title>

  <link rel="stylesheet"
  href="https://unpkg.com/leaflet/dist/leaflet.css">

  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <link rel="stylesheet"
  href="mapa.css">

</head>
<body>

  <div class="sidebar">

    <div class="logo">
      QMap Monitor
    </div>

    <div class="veiculos"
id="listaVeiculos"></div>

<div class="bottom-menu">

  <button>
    <i class="fa-solid fa-map"></i>
    <span>Mapa</span>
  </button>

  <button>
    <i class="fa-solid fa-car"></i>
    <span>Veículos</span>
  </button>

  <button id="btnSair">
    <i class="fa-solid fa-right-from-bracket"></i>
    <span>Sair</span>
  </button>

</div>

    </div>

    <div id="map"></div>

  </div>

  <button
  class="btn-float"
  id="abrirModal">
    +
  </button>

  <div class="modal"
  id="modal">

    <div class="modal-content">

      <h3>Novo Veículo</h3>

      <input type="text"
      id="nome"
      placeholder="Nome">

      <input type="text"
      id="placa"
      placeholder="Placa">

      <input type="text"
      id="imei"
      placeholder="IMEI">

      <select id="status">
        <option value="online">Online</option>
        <option value="offline">Offline</option>
      </select>

      <button id="salvar"
      class="salvar">
        Salvar
      </button>

      <button id="fechar"
      class="cancelar">
        Cancelar
      </button>

    </div>

  </div>

  <script
  src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <script type="module"
  src="mapa.js"></script>

</body>
</html>
