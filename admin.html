<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>QMap Admin</title>

  <link rel="stylesheet" href="admin.css">

</head>
<body>

  <div class="topbar">

    <h1>QMap ADMIN</h1>

    <button id="btnSair">
      Sair
    </button>

  </div>

  <div class="container">

    <div class="card">
      <h2>Total Veículos</h2>
      <p id="totalVeiculos">0</p>
    </div>

    <div class="card">
      <h2>Online</h2>
      <p id="online">0</p>
    </div>

    <div class="card">
      <h2>Usuários</h2>
      <p id="usuarios">0</p>
    </div>

  </div>

  <div class="novo-veiculo">

  <h2>Adicionar Veículo</h2>

    <input
  type="text"
  id="uid"
  placeholder="UID do usuário">

  <input
  type="text"
  id="nome"
  placeholder="Nome">

  <input
  type="text"
  id="placa"
  placeholder="Placa">

  <input
  type="text"
  id="imei"
  placeholder="IMEI">

  <select id="status">

    <option value="online">
      Online
    </option>

    <option value="offline">
      Offline
    </option>

  </select>

  <button id="salvar">

    Salvar Veículo

  </button>

</div>

  <div id="lista"></div>

  <script type="module" src="admin.js"></script>

</body>
</html>
